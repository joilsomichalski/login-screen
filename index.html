<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="background">
        <video autoplay loop muted>
            <source src="assets/space.spc.mp4" type="video/mp4">
        </video>
    </div>
    <main class="container">
        <form>
            <h1>Login</h1>
            
            <div class="input-box"> 
                <input type="email" placeholder="Digite seu email">
                <img class="develop" src="/assets/mail.png" alt="Ícone de email">
            </div>

            <div class="input-box"> 
                <input type="password" placeholder="Digite sua senha">
                <img class="door" src="/assets/startup.png" alt="Ícone de senha">
            </div>

            <div class="forgot-login">
                <label>
                    <input type="checkbox">
                    Lembrar senha
                </label>
                
                <a href="#">Esqueci a senha</a>
            </div>

            <button type="submit">Entrar</button>

            <div class="register">
                <p>Não tem uma conta? <a href="#">Registrar-se</a></p>
            </div>

        </form>
    </main>
</body>
</html>
